<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate">
    <title>Plinko2</title>
    <script type="text/javascript" src="mraid.js"></script>
    <script>
      window.STORE_URL = '';
      window.ANDROID_STORE_URL = window.STORE_URL;
      window.IOS_STORE_URL = window.STORE_URL;

      window.INITIAL_BALANCE = 25;
      window.BET_AMOUNT = 5;
      window.TARGET_BALANCE = 200;
      window.CURRENCY = 'EUR';
      window.PLAY_BUTTON_TEXT = 'Play';
      window.WELCOME_TEXT = 'Welcome Bonus';
      window.WELCOME_TEXT_2 = '';
      window.RECEIVE_BUTTON_TEXT = 'RECEIVE';

      window.FINAL_TITLE_TEXT = 'Congratulations!';
      window.FINAL_TEXT = 'YOU WON';
      window.FREE_SPINS_TEXT = '+ 250 free spins';
      window.INSTALL_BUTTON_TEXT = 'INSTALL';

      window.getPlayableStoreUrl = function getPlayableStoreUrl() {
        var userAgent = navigator.userAgent || '';
        var isIOS = /iPhone|iPad|iPod/i.test(userAgent);
        var isAndroid = /Android/i.test(userAgent);

        if (isIOS) {
          return window.IOS_STORE_URL || window.STORE_URL || window.ANDROID_STORE_URL;
        }

        if (isAndroid) {
          return window.ANDROID_STORE_URL || window.STORE_URL || window.IOS_STORE_URL;
        }

        return window.STORE_URL || window.ANDROID_STORE_URL || window.IOS_STORE_URL;
      };

      (function waitForMraidReady() {
        window.playableMraidReady = false;

        function handleMraidReady() {
          window.playableMraidReady = true;
          window.dispatchEvent(new CustomEvent('playableMraidReady'));
        }

        if (typeof mraid === 'undefined' || !mraid || typeof mraid.getState !== 'function') {
          handleMraidReady();
          return;
        }

        if (mraid.getState() === 'loading' && typeof mraid.addEventListener === 'function') {
          mraid.addEventListener('ready', handleMraidReady);
          return;
        }

        handleMraidReady();
      })();

      window.playableOpenStoreUrl = function playableOpenStoreUrl(url) {
        if (!url) {
          return false;
        }

        var targetUrl = url || window.getPlayableStoreUrl();

        if (!targetUrl) {
          return false;
        }

        if (typeof mraid !== 'undefined' && mraid && typeof mraid.open === 'function') {
          mraid.open(targetUrl);
          return true;
        }

        window.open(targetUrl, '_blank');
        return true;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
